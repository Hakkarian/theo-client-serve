<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Lab 13-14 - Badarla</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <audio id="bgm" class="sr-only" loop preload="auto">
      <source type="audio/mpeg" />
    </audio>

    <div class="bg" aria-hidden="true">
      <div class="bg__grid"></div>
      <div class="bg__glow"></div>
      <div class="bg__scanlines"></div>
      <div class="bg__vignette"></div>
    </div>

    <main class="wrap">
      <nav class="nav" aria-label="Site">
        <a class="nav__link" href="./index.html">Lab 3-4</a>
        <a class="nav__link" href="./lab_5-6.html">Lab 5-6</a>
        <a class="nav__link" href="./lab_7-9.html">Lab 7-9</a>
        <a class="nav__link" href="./lab_11-12.html">Lab 11-12</a>
        <a class="nav__link nav__link--active" href="./lab_13-14.html">Lab 13-14</a>
      </nav>

      <section class="card" aria-label="Content">
        <header class="card__header">
          <h1 class="title title--sm">
            <span class="title__glitch" data-text="КЕРУВАННЯ КОНТАКТАМИ">КЕРУВАННЯ КОНТАКТАМИ</span>
          </h1>
          <p class="subtitle">Telephone Network Contact Manager</p>
        </header>

        <div class="card__body">
          <div style="margin-top: 8px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
              
              <!-- Left Panel: Input Fields -->
              <div style="border-radius: 12px; border: 1px solid rgba(234, 242, 255, 0.9); background: radial-gradient(circle at 10% 0, rgba(0, 245, 255, 0.15), transparent 60%), radial-gradient(circle at 90% 100%, rgba(255, 43, 214, 0.12), transparent 60%), #050510; padding: 24px;">
                <div style="font-family: 'Orbitron', sans-serif; letter-spacing: 0.12em; font-size: 12px; text-transform: uppercase; color: rgba(234, 242, 255, 0.86); margin-bottom: 20px; text-align: center;">ДОДАВАННЯ АБОНЕНТА</div>
                
                <div style="display: flex; flex-direction: column; gap: 16px;">
                  <div>
                    <label for="phoneInput" style="display: block; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(234, 242, 255, 0.9); margin-bottom: 6px; letter-spacing: 0.06em;">НОМЕР ТЕЛЕФОНУ</label>
                    <input 
                      type="tel" 
                      id="phoneInput" 
                      placeholder="+380XXXXXXXXX"
                      style="width: 100%; padding: 10px 14px; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #00f5ff; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 245, 255, 0.4); border-radius: 6px; letter-spacing: 0.05em; transition: all 0.2s;"
                    />
                  </div>

                  <div>
                    <label for="lastNameInput" style="display: block; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(234, 242, 255, 0.9); margin-bottom: 6px; letter-spacing: 0.06em;">ПРІЗВИЩЕ</label>
                    <input 
                      type="text" 
                      id="lastNameInput" 
                      placeholder="Введіть прізвище"
                      style="width: 100%; padding: 10px 14px; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(234, 242, 255, 0.3); border-radius: 6px; transition: all 0.2s;"
                    />
                  </div>

                  <div>
                    <label for="firstNameInput" style="display: block; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(234, 242, 255, 0.9); margin-bottom: 6px; letter-spacing: 0.06em;">ІМ'Я</label>
                    <input 
                      type="text" 
                      id="firstNameInput" 
                      placeholder="Введіть ім'я"
                      style="width: 100%; padding: 10px 14px; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(234, 242, 255, 0.3); border-radius: 6px; transition: all 0.2s;"
                    />
                  </div>

                  <div>
                    <label for="patronymicInput" style="display: block; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(234, 242, 255, 0.9); margin-bottom: 6px; letter-spacing: 0.06em;">ПО БАТЬКОВІ</label>
                    <input 
                      type="text" 
                      id="patronymicInput" 
                      placeholder="Введіть по батькові"
                      style="width: 100%; padding: 10px 14px; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(234, 242, 255, 0.3); border-radius: 6px; transition: all 0.2s;"
                    />
                  </div>

                  <div>
                    <label for="addressInput" style="display: block; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(234, 242, 255, 0.9); margin-bottom: 6px; letter-spacing: 0.06em;">АДРЕСА</label>
                    <input 
                      type="text" 
                      id="addressInput" 
                      placeholder="Введіть адресу"
                      style="width: 100%; padding: 10px 14px; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(234, 242, 255, 0.3); border-radius: 6px; transition: all 0.2s;"
                    />
                  </div>

                  <button id="addBtn" type="button" style="margin-top: 8px; padding: 12px 24px; font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #eaf2ff; background: rgba(0, 245, 255, 0.25); border: 2px solid #00f5ff; border-radius: 6px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);">
                    Додати
                  </button>
                </div>
              </div>

              <!-- Right Panel: Contact Display -->
              <div style="border-radius: 12px; border: 1px solid rgba(234, 242, 255, 0.9); background: radial-gradient(circle at 10% 0, rgba(183, 255, 42, 0.15), transparent 60%), radial-gradient(circle at 90% 100%, rgba(255, 43, 214, 0.12), transparent 60%), #050510; padding: 24px;">
                <div style="font-family: 'Orbitron', sans-serif; letter-spacing: 0.12em; font-size: 12px; text-transform: uppercase; color: rgba(234, 242, 255, 0.86); margin-bottom: 20px; text-align: center;">ПЕРЕГЛЯД КОНТАКТУ</div>
                
                <div id="contactDisplay" style="min-height: 280px; display: flex; flex-direction: column; justify-content: space-between;">
                  <div id="contactInfo" style="flex: 1; display: flex; align-items: center; justify-content: center;">
                    <div style="text-align: center; color: rgba(234, 242, 255, 0.5); font-family: 'Share Tech Mono', monospace; font-size: 12px;">
                      Немає контактів
                    </div>
                  </div>

                  <div style="display: flex; gap: 12px; justify-content: center; margin-top: 16px;">
                    <button id="prevBtn" type="button" disabled style="padding: 10px 20px; font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 600; color: rgba(234, 242, 255, 0.4); background: rgba(255, 191, 54, 0.15); border: 2px solid rgba(255, 191, 54, 0.3); border-radius: 6px; cursor: not-allowed; transition: all 0.3s;">
                      &lt;
                    </button>

                    <button id="viewBtn" type="button" style="padding: 10px 24px; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #eaf2ff; background: rgba(183, 255, 42, 0.25); border: 2px solid #b7ff2a; border-radius: 6px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 15px rgba(183, 255, 42, 0.3);">
                      Перегляд
                    </button>

                    <button id="nextBtn" type="button" disabled style="padding: 10px 20px; font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 600; color: rgba(234, 242, 255, 0.4); background: rgba(255, 191, 54, 0.15); border: 2px solid rgba(255, 191, 54, 0.3); border-radius: 6px; cursor: not-allowed; transition: all 0.3s;">
                      &gt;
                    </button>
                  </div>

                  <button id="sortBtn" type="button" style="margin-top: 12px; width: 100%; padding: 10px 24px; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #eaf2ff; background: rgba(255, 43, 214, 0.25); border: 2px solid #ff2bd6; border-radius: 6px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 15px rgba(255, 43, 214, 0.3);">
                    Сортувати
                  </button>
                </div>
              </div>
            </div>

            <!-- Status/Info Area -->
            <div id="infoArea" style="margin-top: 16px; padding: 16px; background: rgba(234, 242, 255, 0.04); border-radius: 8px; border: 1px solid rgba(234, 242, 255, 0.15);">
              <div style="font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(234, 242, 255, 0.68); text-align: center;">
                <span id="totalContacts">0</span> контактів у базі · Поточна позиція: <span id="currentPosition">-</span>
              </div>
            </div>
          </div>
        </div>

        <footer class="card__footer">
          <span class="chip">LAB_13-14</span>
          <span class="sep" aria-hidden="true">/</span>
          <span class="chip chip--alt">CONTACT MANAGER</span>
        </footer>
      </section>

      <p class="hint">
        <span class="mono">← →</span> switch pages · <span class="mono">Space</span> music on/off
      </p>
    </main>

    <script>
      (() => {
        const audio = document.getElementById("bgm");
        if (!audio) return;

        const params = new URLSearchParams(window.location.search);
        const trackFile = params.get("track") || "Fur_Vijay.mp3";

        const bgmSource = audio.querySelector("source");
        if (bgmSource) {
          bgmSource.src = `./assets/${trackFile}`;
          audio.load();
        }

        const toggleBgm = async () => {
          if (audio.paused) {
            try {
              await audio.play();
            } catch {}
          } else {
            audio.pause();
          }
        };

        const EXIT_DURATION = 320;
        const navigateTo = (url) => {
          const wrap = document.querySelector(".wrap");
          if (wrap) wrap.classList.add("page-exit");
          setTimeout(() => { location.href = url; }, EXIT_DURATION);
        };

        document.querySelectorAll(".nav__link").forEach((link) => {
          link.addEventListener("click", (e) => {
            const href = link.getAttribute("href") || "";
            if (href && !href.startsWith("#") && new URL(link.href, location.href).pathname !== location.pathname) {
              e.preventDefault();
              let url = link.href;
              if (!url.includes("?")) url += (window.location.search || "");
              navigateTo(url);
            }
          });
        });

        document.addEventListener("keydown", (e) => {
          const target = e.target;
          if (target?.closest?.("audio[controls]") || target?.closest?.("input") || target?.closest?.("textarea")) return;
          if (e.code === "Space" && !e.defaultPrevented) {
            e.preventDefault();
            toggleBgm();
          } else if (e.code === "ArrowLeft") {
            e.preventDefault();
            navigateTo("./lab_11-12.html" + window.location.search);
          } else if (e.code === "ArrowRight") {
            e.preventDefault();
            navigateTo("./lab_11-12.html" + window.location.search);
          }
        });

        const card = document.querySelector(".card");
        if (card) {
          const tiltStrength = 8;
          const handleMove = (e) => {
            const rect = card.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            card.style.setProperty("--mouse-x", String(x * 100));
            card.style.setProperty("--mouse-y", String(y * 100));
            card.style.setProperty("--tilt-x", String((y - 0.5) * -tiltStrength + "deg"));
            card.style.setProperty("--tilt-y", String((x - 0.5) * tiltStrength + "deg"));
          };
          const handleLeave = () => {
            card.style.setProperty("--tilt-x", "0deg");
            card.style.setProperty("--tilt-y", "0deg");
          };
          card.addEventListener("pointermove", handleMove);
          card.addEventListener("pointerleave", handleLeave);
        }

        // Contact Management System
        const contactsMap = new Map();
        let sortedPhones = [];
        let currentIndex = -1;

        const phoneInput = document.getElementById("phoneInput");
        const lastNameInput = document.getElementById("lastNameInput");
        const firstNameInput = document.getElementById("firstNameInput");
        const patronymicInput = document.getElementById("patronymicInput");
        const addressInput = document.getElementById("addressInput");

        const addBtn = document.getElementById("addBtn");
        const sortBtn = document.getElementById("sortBtn");
        const viewBtn = document.getElementById("viewBtn");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        const contactInfo = document.getElementById("contactInfo");
        const totalContacts = document.getElementById("totalContacts");
        const currentPosition = document.getElementById("currentPosition");

        const updateContactCount = () => {
          totalContacts.textContent = contactsMap.size;
        };

        const updateNavigationButtons = () => {
          if (sortedPhones.length === 0) {
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            prevBtn.style.cursor = "not-allowed";
            nextBtn.style.cursor = "not-allowed";
            prevBtn.style.color = "rgba(234, 242, 255, 0.4)";
            nextBtn.style.color = "rgba(234, 242, 255, 0.4)";
            prevBtn.style.borderColor = "rgba(255, 191, 54, 0.3)";
            nextBtn.style.borderColor = "rgba(255, 191, 54, 0.3)";
            prevBtn.style.boxShadow = "none";
            nextBtn.style.boxShadow = "none";
          } else {
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= sortedPhones.length - 1;
            
            prevBtn.style.cursor = prevBtn.disabled ? "not-allowed" : "pointer";
            nextBtn.style.cursor = nextBtn.disabled ? "not-allowed" : "pointer";
            
            prevBtn.style.color = prevBtn.disabled ? "rgba(234, 242, 255, 0.4)" : "#ffbf36";
            nextBtn.style.color = nextBtn.disabled ? "rgba(234, 242, 255, 0.4)" : "#ffbf36";
            
            prevBtn.style.borderColor = prevBtn.disabled ? "rgba(255, 191, 54, 0.3)" : "#ffbf36";
            nextBtn.style.borderColor = nextBtn.disabled ? "rgba(255, 191, 54, 0.3)" : "#ffbf36";
            
            prevBtn.style.boxShadow = prevBtn.disabled ? "none" : "0 0 15px rgba(255, 191, 54, 0.3)";
            nextBtn.style.boxShadow = nextBtn.disabled ? "none" : "0 0 15px rgba(255, 191, 54, 0.3)";
          }
        };

        const displayContact = (index) => {
          if (index < 0 || index >= sortedPhones.length) {
            contactInfo.innerHTML = `
              <div style="text-align: center; color: rgba(234, 242, 255, 0.5); font-family: 'Share Tech Mono', monospace; font-size: 12px;">
                Немає контактів
              </div>
            `;
            currentPosition.textContent = "-";
            updateNavigationButtons();
            return;
          }

          const phone = sortedPhones[index];
          const contact = contactsMap.get(phone);
          currentIndex = index;

          contactInfo.innerHTML = `
            <div style="padding: 20px; background: rgba(0, 0, 0, 0.3); border-radius: 8px; border: 1px solid rgba(183, 255, 42, 0.3);">
              <div style="margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(234, 242, 255, 0.15);">
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(234, 242, 255, 0.6); margin-bottom: 4px; letter-spacing: 0.08em;">ТЕЛЕФОН</div>
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 16px; color: #00f5ff; font-weight: 600;">${phone}</div>
              </div>

              <div style="margin-bottom: 12px;">
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(234, 242, 255, 0.6); margin-bottom: 4px;">ПРІЗВИЩЕ</div>
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff;">${contact.lastName}</div>
              </div>

              <div style="margin-bottom: 12px;">
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(234, 242, 255, 0.6); margin-bottom: 4px;">ІМ'Я</div>
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff;">${contact.firstName}</div>
              </div>

              <div style="margin-bottom: 12px;">
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(234, 242, 255, 0.6); margin-bottom: 4px;">ПО БАТЬКОВІ</div>
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff;">${contact.patronymic}</div>
              </div>

              <div>
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(234, 242, 255, 0.6); margin-bottom: 4px;">АДРЕСА</div>
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #eaf2ff;">${contact.address}</div>
              </div>
            </div>
          `;

          currentPosition.textContent = `${index + 1} / ${sortedPhones.length}`;
          updateNavigationButtons();
        };

        const showNotification = (message, color = "#b7ff2a") => {
          const notification = document.createElement("div");
          notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid ${color};
            border-radius: 8px;
            color: ${color};
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            box-shadow: 0 0 20px ${color}40;
            z-index: 1000;
            animation: slideIn 0.3s ease;
          `;
          notification.textContent = message;
          document.body.appendChild(notification);

          setTimeout(() => {
            notification.style.animation = "slideOut 0.3s ease";
            setTimeout(() => notification.remove(), 300);
          }, 3000);
        };

        // Add button handler
        addBtn.addEventListener("click", () => {
          const phone = phoneInput.value.trim();
          const lastName = lastNameInput.value.trim();
          const firstName = firstNameInput.value.trim();
          const patronymic = patronymicInput.value.trim();
          const address = addressInput.value.trim();

          if (!phone) {
            showNotification("Введіть номер телефону!", "#ff6b42");
            phoneInput.focus();
            return;
          }

          if (!lastName || !firstName || !patronymic || !address) {
            showNotification("Заповніть всі поля!", "#ff6b42");
            return;
          }

          if (contactsMap.has(phone)) {
            showNotification("Контакт з таким номером вже існує!", "#ffbf36");
            return;
          }

          contactsMap.set(phone, {
            lastName,
            firstName,
            patronymic,
            address
          });

          phoneInput.value = "";
          lastNameInput.value = "";
          firstNameInput.value = "";
          patronymicInput.value = "";
          addressInput.value = "";

          showNotification("✓ Контакт додано успішно!", "#b7ff2a");
          updateContactCount();
          phoneInput.focus();
        });

        // Sort button handler
        sortBtn.addEventListener("click", () => {
          if (contactsMap.size === 0) {
            showNotification("Немає контактів для сортування", "#ffbf36");
            return;
          }

          sortedPhones = Array.from(contactsMap.keys()).sort((a, b) => {
            const numA = a.replace(/\D/g, "");
            const numB = b.replace(/\D/g, "");
            return numA.localeCompare(numB, undefined, { numeric: true });
          });

          showNotification("✓ Список відсортовано", "#b7ff2a");
        });

        // View button handler (shows first record)
        viewBtn.addEventListener("click", () => {
          if (contactsMap.size === 0) {
            showNotification("Немає контактів для перегляду", "#ffbf36");
            return;
          }

          if (sortedPhones.length === 0) {
            sortedPhones = Array.from(contactsMap.keys()).sort((a, b) => {
              const numA = a.replace(/\D/g, "");
              const numB = b.replace(/\D/g, "");
              return numA.localeCompare(numB, undefined, { numeric: true });
            });
          }

          currentIndex = 0;
          displayContact(currentIndex);
        });

        // Previous button handler
        prevBtn.addEventListener("click", () => {
          if (currentIndex > 0) {
            currentIndex--;
            displayContact(currentIndex);
          }
        });

        // Next button handler
        nextBtn.addEventListener("click", () => {
          if (currentIndex < sortedPhones.length - 1) {
            currentIndex++;
            displayContact(currentIndex);
          }
        });

        // Input focus effects
        const inputs = [phoneInput, lastNameInput, firstNameInput, patronymicInput, addressInput];
        inputs.forEach((input) => {
          input.addEventListener("focus", () => {
            input.style.borderColor = "#00f5ff";
            input.style.boxShadow = "0 0 15px rgba(0, 245, 255, 0.3)";
          });
          input.addEventListener("blur", () => {
            input.style.borderColor = input === phoneInput ? "rgba(0, 245, 255, 0.4)" : "rgba(234, 242, 255, 0.3)";
            input.style.boxShadow = "none";
          });
        });

        // Button hover effects
        addBtn.addEventListener("mouseenter", () => {
          addBtn.style.background = "rgba(0, 245, 255, 0.35)";
          addBtn.style.boxShadow = "0 0 25px rgba(0, 245, 255, 0.5)";
        });
        addBtn.addEventListener("mouseleave", () => {
          addBtn.style.background = "rgba(0, 245, 255, 0.25)";
          addBtn.style.boxShadow = "0 0 15px rgba(0, 245, 255, 0.3)";
        });

        sortBtn.addEventListener("mouseenter", () => {
          sortBtn.style.background = "rgba(255, 43, 214, 0.35)";
          sortBtn.style.boxShadow = "0 0 25px rgba(255, 43, 214, 0.5)";
        });
        sortBtn.addEventListener("mouseleave", () => {
          sortBtn.style.background = "rgba(255, 43, 214, 0.25)";
          sortBtn.style.boxShadow = "0 0 15px rgba(255, 43, 214, 0.3)";
        });

        viewBtn.addEventListener("mouseenter", () => {
          viewBtn.style.background = "rgba(183, 255, 42, 0.35)";
          viewBtn.style.boxShadow = "0 0 25px rgba(183, 255, 42, 0.5)";
        });
        viewBtn.addEventListener("mouseleave", () => {
          viewBtn.style.background = "rgba(183, 255, 42, 0.25)";
          viewBtn.style.boxShadow = "0 0 15px rgba(183, 255, 42, 0.3)";
        });

        // Add some sample contacts for testing
        const addSampleContacts = () => {
          const samples = [
            { phone: "+380501234567", lastName: "Іваненко", firstName: "Іван", patronymic: "Іванович", address: "вул. Хрещатик, 1, Київ" },
            { phone: "+380671234567", lastName: "Петренко", firstName: "Петро", patronymic: "Петрович", address: "просп. Науки, 45, Харків" },
            { phone: "+380631234567", lastName: "Сидоренко", firstName: "Олена", patronymic: "Миколаївна", address: "вул. Дерибасівська, 10, Одеса" }
          ];

          samples.forEach(sample => {
            contactsMap.set(sample.phone, {
              lastName: sample.lastName,
              firstName: sample.firstName,
