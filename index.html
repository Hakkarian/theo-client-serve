<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Badarla — Lab 3-4</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <div class="bg" aria-hidden="true">
      <div class="bg__grid"></div>
      <div class="bg__glow"></div>
      <div class="bg__scanlines"></div>
      <div class="bg__vignette"></div>
    </div>

    <audio id="bgm" class="sr-only">
      <source src="./assets/Fur_Vijay.mp3" type="audio/mpeg" />
    </audio>

    <main class="wrap">
      <nav class="nav" aria-label="Site">
        <a class="nav__link nav__link--active" href="./index.html">Lab 3-4</a>
        <a class="nav__link" href="./lab_5-6.html">Lab 5-6</a>
        <a class="nav__link" href="./lab_7-9.html">Lab 7-9</a>
        <a class="nav__link" href="./lab_11-12.html">Lab 11-12</a>
      </nav>

      <section class="card" aria-label="Profile card">
        <header class="card__header">
          <div class="badge" aria-hidden="true">
            <span class="badge__dot"></span>
            <span class="badge__text">ONLINE</span>
          </div>

          <div class="hero">
            <div class="avatar" aria-hidden="true">
              <img class="avatar__img" src="./assets/profile.png" alt="" />
              <span class="avatar__ring"></span>
            </div>

            <div class="hero__text">
          <h1 class="title">
            <span class="title__glitch" data-text="LAB 3-4">LAB 3-4</span>
          </h1>
          <p class="subtitle">Theodore Badarla Prasadovich · 4CS</p>
            </div>
          </div>
        </header>

        <div class="card__body">
          <dl class="meta">
            <div class="meta__row">
              <dt>Last name</dt>
              <dd>Badarla</dd>
            </div>
            <div class="meta__row">
              <dt>First name</dt>
              <dd>Theodore</dd>
            </div>
            <div class="meta__row">
              <dt>Patronymic</dt>
              <dd>Prasadovich</dd>
            </div>
            <div class="meta__row">
              <dt>Group</dt>
              <dd>4CS</dd>
            </div>
          </dl>

          <div class="pad">
            <div class="pad__header">Neon pad</div>
            <canvas id="paintArea" class="pad__canvas"></canvas>
            <p class="pad__hint">Draw with mouse or touch.</p>
          </div>

          <div class="cta">
            <a class="btn btn--primary" href="#" onclick="return false;">View profile</a>
            <a class="btn btn--ghost" href="#" onclick="return false;">Contact</a>
            <button class="btn btn--ghost" type="button" id="soundBtn">Enable sound</button>
          </div>
        </div>

        <footer class="card__footer">
          <span class="chip">LAB_3-4</span>
          <span class="sep" aria-hidden="true">/</span>
          <span class="chip chip--alt">CYBERPUNK UI</span>
        </footer>
      </section>

      <p class="hint">
        <span class="mono">← →</span> switch pages · <span class="mono">Space</span> music on/off
      </p>
    </main>

    <script>
      (() => {
        const audio = document.getElementById("bgm");
        const btn = document.getElementById("soundBtn");

        const params = new URLSearchParams(window.location.search);
        const trackFile = params.get("track") || "Fur_Vijay.mp3";

        if (audio) {
          const bgmSource = audio.querySelector("source");
          if (bgmSource) {
            bgmSource.src = `./assets/${trackFile}`;
            audio.load();
          }
        }

        const setState = (state) => {
          if (btn) {
            btn.dataset.state = state;
            btn.textContent = state === "playing" ? "Sound: ON" : "Enable sound";
          }
        };

        const tryPlay = async () => {
          try {
            await audio.play();
            setState("playing");
          } catch {
            setState("blocked");
          }
        };

        const toggleBgm = async () => {
          if (!audio) return;
          if (audio.paused) await tryPlay();
          else {
            audio.pause();
            setState("paused");
          }
        };

        if (btn) btn.addEventListener("click", toggleBgm);

        const EXIT_DURATION = 320;
        const navigateTo = (url) => {
          const wrap = document.querySelector(".wrap");
          if (wrap) wrap.classList.add("page-exit");
          setTimeout(() => { location.href = url; }, EXIT_DURATION);
        };

        document.querySelectorAll(".nav__link").forEach((link) => {
          link.addEventListener("click", (e) => {
            const href = link.getAttribute("href") || "";
            if (href && !href.startsWith("#") && new URL(link.href, location.href).pathname !== location.pathname) {
              e.preventDefault();
              let url = link.href;
              if (!url.includes("?")) url += (window.location.search || "");
              navigateTo(url);
            }
          });
        });

        document.addEventListener("keydown", (e) => {
          const target = e.target;
          if (target?.closest?.("audio[controls]") || target?.closest?.("input") || target?.closest?.("textarea")) return;
          if (e.code === "Space" && !e.defaultPrevented) {
            e.preventDefault();
            toggleBgm();
          } else if (e.code === "ArrowRight") {
            e.preventDefault();
            navigateTo("./lab_5-6.html" + window.location.search);
          }
        });

        const card = document.querySelector(".card");
        if (card) {
          const tiltStrength = 8;
          const handleMove = (e) => {
            const rect = card.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            card.style.setProperty("--mouse-x", String(x * 100));
            card.style.setProperty("--mouse-y", String(y * 100));
            card.style.setProperty("--tilt-x", String((y - 0.5) * -tiltStrength + "deg"));
            card.style.setProperty("--tilt-y", String((x - 0.5) * tiltStrength + "deg"));
          };
          const handleLeave = () => {
            card.style.setProperty("--tilt-x", "0deg");
            card.style.setProperty("--tilt-y", "0deg");
          };
          card.addEventListener("pointermove", handleMove);
          card.addEventListener("pointerleave", handleLeave);
        }

        const canvas = document.getElementById("paintArea");
        if (canvas && canvas.getContext) {
          const ctx = canvas.getContext("2d");

          const resize = () => {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
          };

          resize();
          window.addEventListener("resize", resize);

          let drawing = false;
          let lastX = 0;
          let lastY = 0;

          const getPos = (ev) => {
            const rect = canvas.getBoundingClientRect();
            return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
          };

          const start = (ev) => {
            drawing = true;
            const { x, y } = getPos(ev);
            lastX = x;
            lastY = y;
          };

          const move = (ev) => {
            if (!drawing) return;
            const { x, y } = getPos(ev);
            const hue = (Date.now() / 20) % 360;
            ctx.strokeStyle = `hsl(${hue}, 100%, 65%)`;
            ctx.lineWidth = 3;
            ctx.shadowColor = ctx.strokeStyle;
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x;
            lastY = y;
          };

          const stop = () => {
            drawing = false;
          };

          canvas.addEventListener("pointerdown", (ev) => {
            canvas.setPointerCapture(ev.pointerId);
            start(ev);
          });

          canvas.addEventListener("pointermove", (ev) => {
            if (!drawing) return;
            move(ev);
          });

          canvas.addEventListener("pointerup", (ev) => {
            stop();
            canvas.releasePointerCapture(ev.pointerId);
          });

          canvas.addEventListener("pointerleave", stop);
        }
      })();
    </script>
  </body>
</html>
